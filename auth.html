<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Sign Up - Ryino Cinema</title>
  
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <meta name="theme-color" content="#f59e0b">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#0b0f19',
              gold: '#f59e0b',
            }
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="style.css">
  
  <!-- Cek sesi di awal halaman, jika sudah login redirect ke index -->
  <script>
    const userSession = JSON.parse(localStorage.getItem('ryino_session'));
    if(userSession) {
      window.location.href = 'index.html';
    }
  </script>
</head>
<body class="bg-[#0b0f19] text-white selection:bg-amber-500 selection:text-slate-950 min-h-screen flex items-center justify-center relative overflow-hidden">
  
  <!-- Background Elements -->
  <div class="absolute inset-0 bg-cover bg-center opacity-[0.1]" style="background-image: url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=1600&auto=format&fit=crop&q=80')"></div>
  <div class="absolute w-[40rem] h-[40rem] bg-amber-500/20 rounded-full blur-[120px] top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md px-4">
    <div class="text-center mb-8">
      <a href="#" class="inline-flex items-center justify-center gap-2 mb-2 group">
        <svg class="w-10 h-10 text-amber-500 fill-current group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
          <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
        </svg>
      </a>
      <h1 class="text-3xl font-extrabold tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent font-sans text-glow-gold">
        RYINO CINEMA
      </h1>
      <p class="text-slate-400 text-sm mt-2">Masuk untuk memulai petualangan sinema Anda.</p>
    </div>

    <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl shadow-2xl overflow-hidden card-glow">
      <!-- Tabs -->
      <div class="flex text-sm font-bold text-center border-b border-slate-800">
        <button id="tab-login" class="flex-1 py-4 text-amber-500 border-b-2 border-amber-500 transition-colors">LOGIN</button>
        <button id="tab-signup" class="flex-1 py-4 text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-colors">SIGN UP</button>
      </div>

      <div class="p-8">
        <!-- Login Form -->
        <form id="form-login" class="space-y-6 block">
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
            <input type="email" id="login-email" required placeholder="nama@email.com" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:border-amber-500 text-white placeholder-slate-600 focus:outline-none transition-colors text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
            <input type="password" id="login-password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:border-amber-500 text-white placeholder-slate-600 focus:outline-none transition-colors text-sm">
          </div>
          <button type="submit" class="w-full py-4 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-slate-950 font-bold rounded-xl shadow-lg shadow-amber-500/20 transition-all">
            Sign In to Cinema
          </button>
        </form>

        <!-- Sign Up Form -->
        <form id="form-signup" class="space-y-6 hidden">
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Full Name</label>
            <input type="text" id="signup-name" required placeholder="John Doe" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:border-amber-500 text-white placeholder-slate-600 focus:outline-none transition-colors text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
            <input type="email" id="signup-email" required placeholder="nama@email.com" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:border-amber-500 text-white placeholder-slate-600 focus:outline-none transition-colors text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
            <input type="password" id="signup-password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:border-amber-500 text-white placeholder-slate-600 focus:outline-none transition-colors text-sm">
          </div>
          <button type="submit" class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold rounded-xl transition-all">
            Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Notification System for Auth -->
  <div id="toast-container" class="fixed top-8 right-4 z-[100] flex flex-col gap-3 pointer-events-none"></div>

  <script src="auth.js"></script>
</body>
</html>
